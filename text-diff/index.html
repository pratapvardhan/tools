<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://pratapvardhan.com/assets/favicon.ico">
    <title>Text Diff</title>
    <script>
        (() => {
            const storageKey = "text-diff-theme";
            let theme = "light";

            try {
                const savedTheme = localStorage.getItem(storageKey);
                const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
                theme = savedTheme === "dark" || savedTheme === "light"
                    ? savedTheme
                    : prefersDark ? "dark" : "light";
            } catch (error) {
                theme = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            }

            document.documentElement.dataset.theme = theme;
            window.textDiffInitialTheme = theme;
        })();
    </script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f4;
            --surface: #ffffff;
            --surface-muted: #f1f4f2;
            --editor-bg: #fbfcfa;
            --border: #d8ded7;
            --border-strong: #aeb9ad;
            --text: #202521;
            --muted: #637069;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --on-accent: #ffffff;
            --danger: #a33b34;
            --warn: #956216;
            --added-bg: #e8f7ed;
            --added-text: #174b2b;
            --removed-bg: #fae8e6;
            --removed-text: #6e1f1a;
            --changed-border: #d79420;
            --blank-bg: #f5f6f4;
            --line-number-bg: #eef1ed;
            --shadow: 0 1px 2px rgba(20, 28, 22, 0.08);
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #151817;
            --surface: #1f2422;
            --surface-muted: #252b2a;
            --editor-bg: #171b19;
            --border: #3d4741;
            --border-strong: #526159;
            --text: #edf0ed;
            --muted: #a8b3ad;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --on-accent: #0d1715;
            --danger: #f08b80;
            --warn: #f2b56b;
            --added-bg: #173422;
            --added-text: #b9f4c9;
            --removed-bg: #3b1d1b;
            --removed-text: #ffc2bd;
            --changed-border: #f2b56b;
            --blank-bg: #202523;
            --line-number-bg: #242a27;
            --shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-width: 320px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr) auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.85rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .title-block {
            min-width: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 0.15rem 0 0;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .actions,
        .panel-actions,
        .format-row,
        .options {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .button,
        .segment {
            min-height: 2.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.35rem 0.65rem;
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .button:hover,
        .segment:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .button:focus-visible,
        .segment:focus-visible,
        textarea:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .button.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: var(--on-accent);
        }

        .button.primary:hover {
            background: var(--accent-hover);
            color: var(--on-accent);
        }

        .button.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .button svg,
        .segment svg {
            width: 0.95rem;
            height: 0.95rem;
            flex: 0 0 auto;
        }

        .button.icon-button {
            width: 2.1rem;
            padding-inline: 0;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: var(--surface-muted);
            border-bottom: 1px solid var(--border);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .control-label {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .segmented {
            display: inline-flex;
            align-items: stretch;
            flex-wrap: nowrap;
        }

        .segment {
            border-radius: 0;
            font-weight: 650;
        }

        .segment:first-child {
            border-radius: 6px 0 0 6px;
        }

        .segment:last-child {
            border-radius: 0 6px 6px 0;
        }

        .segment + .segment {
            margin-left: -1px;
        }

        .segment[aria-pressed="true"] {
            position: relative;
            z-index: 1;
            border-color: var(--accent);
            background: var(--accent);
            color: var(--on-accent);
        }

        .check {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--text);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .check input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--accent);
        }

        .summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .summary-text {
            min-height: 1.25rem;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 650;
        }

        .summary-note {
            color: var(--muted);
            font-size: 0.82rem;
            text-align: right;
        }

        .workspace {
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 1rem;
            padding: 1rem;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1rem;
            min-height: 0;
        }

        .panel {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .panel-header {
            min-height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.55rem 0.75rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-muted);
        }

        .panel-title-wrap {
            min-width: 0;
        }

        .panel-title {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .status {
            min-height: 1.15rem;
            margin-top: 0.05rem;
            color: var(--muted);
            font-size: 0.78rem;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            height: 100%;
            min-height: 15rem;
            resize: vertical;
            border: 0;
            outline: 0;
            padding: 1rem;
            color: var(--text);
            background: var(--editor-bg);
            font: 0.92rem/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            tab-size: 4;
        }

        .diff-panel {
            min-height: 24rem;
        }

        .diff-scroll {
            min-height: 0;
            overflow: auto;
            background: var(--surface);
        }

        .diff-view {
            min-width: 780px;
        }

        .diff-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            border-bottom: 1px solid var(--border);
        }

        .diff-row:last-child {
            border-bottom: 0;
        }

        .diff-row.is-changed {
            box-shadow: inset 3px 0 var(--changed-border);
        }

        .diff-cell {
            min-width: 0;
            display: grid;
            grid-template-columns: 4rem minmax(0, 1fr);
        }

        .diff-cell:first-child {
            border-right: 1px solid var(--border);
        }

        .line-number {
            user-select: none;
            padding: 0.38rem 0.5rem;
            border-right: 1px solid var(--border);
            background: var(--line-number-bg);
            color: var(--muted);
            font: 0.78rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            text-align: right;
        }

        .line-text {
            min-height: 1.8rem;
            display: block;
            padding: 0.38rem 0.6rem;
            color: var(--text);
            font: 0.86rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            overflow: visible;
            white-space: pre;
        }

        .diff-view[data-wrap="true"] .line-text {
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        .diff-row.is-added .right-cell .line-text,
        .diff-row.is-changed .right-cell .line-text {
            background: var(--added-bg);
            color: var(--added-text);
        }

        .diff-row.is-removed .left-cell .line-text,
        .diff-row.is-changed .left-cell .line-text {
            background: var(--removed-bg);
            color: var(--removed-text);
        }

        .diff-cell.is-empty .line-text {
            background: var(--blank-bg);
        }

        .empty {
            min-height: 14rem;
            display: grid;
            place-items: center;
            padding: 1rem;
            color: var(--muted);
            text-align: center;
        }

        .message {
            min-height: 1.25rem;
            padding: 0 1rem 0.8rem;
            color: var(--warn);
            font-size: 0.86rem;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 980px) {
            .topbar,
            .controls,
            .summary {
                align-items: stretch;
                flex-direction: column;
            }

            .actions,
            .options,
            .format-row {
                justify-content: flex-start;
            }

            .summary-note {
                text-align: left;
            }

            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            .topbar,
            .controls,
            .summary,
            .workspace {
                padding: 0.75rem;
            }

            .actions,
            .panel-actions,
            .format-row,
            .control-group {
                width: 100%;
            }

            .actions {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .button {
                flex: 1 1 auto;
                min-width: 0;
                padding-inline: 0.45rem;
            }

            .button.icon-button {
                width: 100%;
            }

            .segmented {
                width: 100%;
            }

            .segment {
                flex: 1 1 0;
                min-width: 0;
                padding-inline: 0.35rem;
            }

            .options {
                width: 100%;
                align-items: flex-start;
                flex-direction: column;
                gap: 0.45rem;
            }

            .panel-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .status {
                white-space: normal;
            }

            textarea {
                min-height: 13rem;
            }

            .diff-view {
                min-width: 720px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="title-block">
                <h1>Text Diff</h1>
                <p class="subtitle">Compare two text versions side by side. All processing happens in your browser.</p>
            </div>
            <div class="actions" aria-label="Text diff actions">
                <button class="button icon-button" type="button" id="themeButton" title="Switch to dark mode" aria-label="Switch to dark mode" aria-pressed="false">
                    <i data-lucide="moon" aria-hidden="true"></i>
                </button>
                <button class="button" type="button" id="sampleButton" title="Load sample text">
                    <i data-lucide="file-text" aria-hidden="true"></i>
                    <span>Sample</span>
                </button>
                <button class="button" type="button" id="swapButton" title="Swap original and revised text">
                    <i data-lucide="arrow-left-right" aria-hidden="true"></i>
                    <span>Swap</span>
                </button>
                <button class="button danger" type="button" id="clearButton" title="Clear both text boxes">
                    <i data-lucide="trash-2" aria-hidden="true"></i>
                    <span>Clear</span>
                </button>
            </div>
        </header>

        <section class="controls" aria-label="Diff settings">
            <div class="format-row">
                <div class="control-group">
                    <span class="control-label">View</span>
                    <div class="segmented" role="group" aria-label="Diff rows to show">
                        <button class="segment" type="button" data-view-mode="all" aria-pressed="true">All</button>
                        <button class="segment" type="button" data-view-mode="changes" aria-pressed="false">Changes</button>
                    </div>
                </div>
            </div>
            <div class="options" aria-label="Comparison options">
                <label class="check">
                    <input type="checkbox" id="ignoreWhitespace">
                    <span>Ignore whitespace</span>
                </label>
                <label class="check">
                    <input type="checkbox" id="ignoreCase">
                    <span>Ignore case</span>
                </label>
                <label class="check">
                    <input type="checkbox" id="wrapLines" checked>
                    <span>Wrap lines</span>
                </label>
                <label class="check">
                    <input type="checkbox" id="syncEditors" checked>
                    <span>Sync editors</span>
                </label>
            </div>
        </section>

        <section class="summary" aria-label="Diff summary">
            <div class="summary-text" id="summaryText" aria-live="polite"></div>
            <div class="summary-note" id="summaryNote">Files never leave your device. Large files may be slow.</div>
        </section>

        <section class="workspace" aria-label="Text inputs and side-by-side diff">
            <section class="editor-grid" aria-label="Text versions">
                <section class="panel">
                    <div class="panel-header">
                        <div class="panel-title-wrap">
                            <h2 class="panel-title">Original</h2>
                            <div class="status" id="originalStatus" aria-live="polite"></div>
                        </div>
                        <div class="panel-actions">
                            <button class="button" type="button" id="openOriginalButton" title="Open original text file">
                                <i data-lucide="folder-open" aria-hidden="true"></i>
                                <span>Open</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="originalText" spellcheck="false" aria-label="Original text" placeholder="Paste the original text here"></textarea>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <div class="panel-title-wrap">
                            <h2 class="panel-title">Revised</h2>
                            <div class="status" id="revisedStatus" aria-live="polite"></div>
                        </div>
                        <div class="panel-actions">
                            <button class="button" type="button" id="openRevisedButton" title="Open revised text file">
                                <i data-lucide="folder-open" aria-hidden="true"></i>
                                <span>Open</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="revisedText" spellcheck="false" aria-label="Revised text" placeholder="Paste the revised text here"></textarea>
                </section>
            </section>

            <section class="panel diff-panel">
                <div class="panel-header">
                    <div class="panel-title-wrap">
                        <h2 class="panel-title">Side-by-side diff</h2>
                        <div class="status" id="diffStatus" aria-live="polite"></div>
                    </div>
                    <div class="panel-actions">
                        <button class="button primary" type="button" id="copyButton" title="Copy visible diff as CSV">
                            <i data-lucide="copy" aria-hidden="true"></i>
                            <span>Copy</span>
                        </button>
                        <button class="button icon-button" type="button" id="downloadButton" title="Download visible diff as CSV" aria-label="Download visible diff as CSV">
                            <i data-lucide="download" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
                <div class="diff-scroll" id="diffScroll">
                    <div class="diff-view" id="diffView" data-wrap="true"></div>
                </div>
            </section>
        </section>

        <div class="message" id="message" aria-live="polite"></div>

        <input class="sr-only" type="file" id="originalFileInput" accept=".txt,.text,.md,.markdown,.csv,.tsv,text/*">
        <input class="sr-only" type="file" id="revisedFileInput" accept=".txt,.text,.md,.markdown,.csv,.tsv,text/*">
    </main>

    <script>
        const sampleOriginal = `Project notes
Status: draft
Owners: Maya, Lee

Tasks
- Parse CSV files
- Export reports
- Send weekly summary

Risks
Large files may need batching.`;

        const sampleRevised = `Project notes
Status: ready
Owners: Maya, Lee, Noor

Tasks
- Parse CSV and TSV files
- Export reports
- Send weekly summary
- Add keyboard shortcuts

Risks
Large files may need batching.
All processing happens in the browser.`;

        const state = {
            viewMode: "all",
            ignoreWhitespace: false,
            ignoreCase: false,
            wrapLines: true,
            syncEditors: true,
            rows: [],
            visibleRows: [],
            warning: ""
        };

        const themeStorageKey = "text-diff-theme";
        const maxMatrixCells = 6000000;
        const systemThemeQuery = window.matchMedia?.("(prefers-color-scheme: dark)") || null;

        const originalText = document.getElementById("originalText");
        const revisedText = document.getElementById("revisedText");
        const originalStatus = document.getElementById("originalStatus");
        const revisedStatus = document.getElementById("revisedStatus");
        const diffStatus = document.getElementById("diffStatus");
        const summaryText = document.getElementById("summaryText");
        const summaryNote = document.getElementById("summaryNote");
        const diffView = document.getElementById("diffView");
        const message = document.getElementById("message");
        const themeButton = document.getElementById("themeButton");
        const sampleButton = document.getElementById("sampleButton");
        const swapButton = document.getElementById("swapButton");
        const clearButton = document.getElementById("clearButton");
        const copyButton = document.getElementById("copyButton");
        const downloadButton = document.getElementById("downloadButton");
        const openOriginalButton = document.getElementById("openOriginalButton");
        const openRevisedButton = document.getElementById("openRevisedButton");
        const originalFileInput = document.getElementById("originalFileInput");
        const revisedFileInput = document.getElementById("revisedFileInput");
        const ignoreWhitespace = document.getElementById("ignoreWhitespace");
        const ignoreCase = document.getElementById("ignoreCase");
        const wrapLines = document.getElementById("wrapLines");
        const syncEditors = document.getElementById("syncEditors");
        const viewModeButtons = Array.from(document.querySelectorAll("[data-view-mode]"));

        let syncLock = false;

        function getStoredTheme() {
            try {
                const savedTheme = localStorage.getItem(themeStorageKey);
                return savedTheme === "dark" || savedTheme === "light" ? savedTheme : null;
            } catch (error) {
                return null;
            }
        }

        function setStoredTheme(theme) {
            try {
                localStorage.setItem(themeStorageKey, theme);
            } catch (error) {
                return;
            }
        }

        function getPreferredTheme() {
            const storedTheme = getStoredTheme();

            if (storedTheme) {
                return storedTheme;
            }

            if (systemThemeQuery) {
                return systemThemeQuery.matches ? "dark" : "light";
            }

            return window.textDiffInitialTheme || "light";
        }

        function updateThemeButton(theme) {
            const nextTheme = theme === "dark" ? "light" : "dark";
            const icon = theme === "dark" ? "sun" : "moon";
            const label = `Switch to ${nextTheme} mode`;

            themeButton.title = label;
            themeButton.setAttribute("aria-label", label);
            themeButton.setAttribute("aria-pressed", String(theme === "dark"));
            themeButton.innerHTML = `<i data-lucide="${icon}" aria-hidden="true"></i>`;

            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        function applyTheme(theme, shouldStore = false) {
            const activeTheme = theme === "dark" ? "dark" : "light";
            document.documentElement.dataset.theme = activeTheme;
            updateThemeButton(activeTheme);

            if (shouldStore) {
                setStoredTheme(activeTheme);
            }
        }

        function normalizeLineEndings(text) {
            return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        }

        function splitLines(text) {
            const normalized = normalizeLineEndings(text);
            return normalized === "" ? [] : normalized.split("\n");
        }

        function comparableLine(line) {
            let value = normalizeLineEndings(String(line));

            if (state.ignoreWhitespace) {
                value = value.replace(/\s+/g, " ").trim();
            }

            if (state.ignoreCase) {
                value = value.toLocaleLowerCase();
            }

            return value;
        }

        function linesEqual(left, right) {
            return comparableLine(left) === comparableLine(right);
        }

        function buildLineByLineOperations(leftLines, rightLines) {
            const operations = [];
            const count = Math.max(leftLines.length, rightLines.length);

            for (let index = 0; index < count; index += 1) {
                const hasLeft = index < leftLines.length;
                const hasRight = index < rightLines.length;

                if (hasLeft && hasRight && linesEqual(leftLines[index], rightLines[index])) {
                    operations.push({
                        type: "equal",
                        leftLine: index + 1,
                        rightLine: index + 1,
                        leftText: leftLines[index],
                        rightText: rightLines[index]
                    });
                } else {
                    if (hasLeft) {
                        operations.push({
                            type: "remove",
                            leftLine: index + 1,
                            leftText: leftLines[index]
                        });
                    }

                    if (hasRight) {
                        operations.push({
                            type: "add",
                            rightLine: index + 1,
                            rightText: rightLines[index]
                        });
                    }
                }
            }

            return operations;
        }

        function buildOperations(leftLines, rightLines) {
            const leftCount = leftLines.length;
            const rightCount = rightLines.length;
            const cells = (leftCount + 1) * (rightCount + 1);

            if (cells > maxMatrixCells) {
                return {
                    operations: buildLineByLineOperations(leftLines, rightLines),
                    warning: "Large input: using line-by-line comparison."
                };
            }

            const matrix = Array.from(
                { length: leftCount + 1 },
                () => new Uint32Array(rightCount + 1)
            );

            for (let leftIndex = 1; leftIndex <= leftCount; leftIndex += 1) {
                for (let rightIndex = 1; rightIndex <= rightCount; rightIndex += 1) {
                    if (linesEqual(leftLines[leftIndex - 1], rightLines[rightIndex - 1])) {
                        matrix[leftIndex][rightIndex] = matrix[leftIndex - 1][rightIndex - 1] + 1;
                    } else {
                        matrix[leftIndex][rightIndex] = Math.max(
                            matrix[leftIndex - 1][rightIndex],
                            matrix[leftIndex][rightIndex - 1]
                        );
                    }
                }
            }

            const operations = [];
            let leftIndex = leftCount;
            let rightIndex = rightCount;

            while (leftIndex > 0 || rightIndex > 0) {
                if (
                    leftIndex > 0 &&
                    rightIndex > 0 &&
                    linesEqual(leftLines[leftIndex - 1], rightLines[rightIndex - 1])
                ) {
                    operations.push({
                        type: "equal",
                        leftLine: leftIndex,
                        rightLine: rightIndex,
                        leftText: leftLines[leftIndex - 1],
                        rightText: rightLines[rightIndex - 1]
                    });
                    leftIndex -= 1;
                    rightIndex -= 1;
                } else if (
                    rightIndex > 0 &&
                    (leftIndex === 0 || matrix[leftIndex][rightIndex - 1] >= matrix[leftIndex - 1][rightIndex])
                ) {
                    operations.push({
                        type: "add",
                        rightLine: rightIndex,
                        rightText: rightLines[rightIndex - 1]
                    });
                    rightIndex -= 1;
                } else if (leftIndex > 0) {
                    operations.push({
                        type: "remove",
                        leftLine: leftIndex,
                        leftText: leftLines[leftIndex - 1]
                    });
                    leftIndex -= 1;
                }
            }

            return { operations: operations.reverse(), warning: "" };
        }

        function alignChangeBlock(block, rows) {
            const removes = block.filter((operation) => operation.type === "remove");
            const adds = block.filter((operation) => operation.type === "add");
            const count = Math.max(removes.length, adds.length);

            for (let index = 0; index < count; index += 1) {
                const remove = removes[index];
                const add = adds[index];

                if (remove && add) {
                    rows.push({
                        type: "changed",
                        leftLine: remove.leftLine,
                        rightLine: add.rightLine,
                        leftText: remove.leftText,
                        rightText: add.rightText
                    });
                } else if (remove) {
                    rows.push({
                        type: "removed",
                        leftLine: remove.leftLine,
                        rightLine: null,
                        leftText: remove.leftText,
                        rightText: ""
                    });
                } else if (add) {
                    rows.push({
                        type: "added",
                        leftLine: null,
                        rightLine: add.rightLine,
                        leftText: "",
                        rightText: add.rightText
                    });
                }
            }
        }

        function alignOperations(operations) {
            const rows = [];
            let block = [];

            operations.forEach((operation) => {
                if (operation.type === "equal") {
                    if (block.length) {
                        alignChangeBlock(block, rows);
                        block = [];
                    }

                    rows.push({
                        type: "unchanged",
                        leftLine: operation.leftLine,
                        rightLine: operation.rightLine,
                        leftText: operation.leftText,
                        rightText: operation.rightText
                    });
                } else {
                    block.push(operation);
                }
            });

            if (block.length) {
                alignChangeBlock(block, rows);
            }

            return rows;
        }

        function countRows(rows) {
            return rows.reduce((counts, row) => {
                counts[row.type] += 1;
                return counts;
            }, {
                unchanged: 0,
                added: 0,
                removed: 0,
                changed: 0
            });
        }

        function formatLineCount(text) {
            const lines = splitLines(text).length;
            const chars = text.length;
            const lineLabel = lines === 1 ? "line" : "lines";
            const charLabel = chars === 1 ? "char" : "chars";
            return text ? `${lines} ${lineLabel} / ${chars} ${charLabel}` : "Empty";
        }

        function createDiffCell(side, lineNumber, text) {
            const cell = document.createElement("div");
            const number = document.createElement("span");
            const content = document.createElement("code");

            cell.className = `diff-cell ${side}-cell`;
            if (lineNumber === null) {
                cell.classList.add("is-empty");
            }

            number.className = "line-number";
            number.textContent = lineNumber === null ? "" : String(lineNumber);

            content.className = "line-text";
            content.textContent = text;

            cell.append(number, content);
            return cell;
        }

        function renderDiff(rows) {
            diffView.textContent = "";
            diffView.dataset.wrap = String(state.wrapLines);

            const hasInput = originalText.value !== "" || revisedText.value !== "";
            if (!hasInput) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = "Paste two versions of text to compare them here.";
                diffView.append(empty);
                return;
            }

            if (!rows.length) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = "No differences found with the current options.";
                diffView.append(empty);
                return;
            }

            rows.forEach((row) => {
                const rowElement = document.createElement("div");
                rowElement.className = `diff-row is-${row.type}`;
                rowElement.append(
                    createDiffCell("left", row.leftLine, row.leftText),
                    createDiffCell("right", row.rightLine, row.rightText)
                );
                diffView.append(rowElement);
            });
        }

        function updateSegments() {
            viewModeButtons.forEach((button) => {
                button.setAttribute("aria-pressed", String(button.dataset.viewMode === state.viewMode));
            });
        }

        function updateSummary(rows) {
            const counts = countRows(rows);
            const changes = counts.added + counts.removed + counts.changed;

            originalStatus.textContent = formatLineCount(originalText.value);
            revisedStatus.textContent = formatLineCount(revisedText.value);

            if (originalText.value === "" && revisedText.value === "") {
                summaryText.textContent = "Empty";
                diffStatus.textContent = "";
            } else if (changes === 0) {
                summaryText.textContent = "No differences";
                diffStatus.textContent = `${counts.unchanged} unchanged`;
            } else {
                summaryText.textContent = `${counts.changed} changed / ${counts.added} added / ${counts.removed} removed`;
                diffStatus.textContent = `${state.visibleRows.length} visible / ${rows.length} total rows`;
            }

            summaryNote.textContent = state.warning || "Files never leave your device. Large files may be slow.";
        }

        function update() {
            const leftLines = splitLines(originalText.value);
            const rightLines = splitLines(revisedText.value);
            const result = buildOperations(leftLines, rightLines);
            const rows = alignOperations(result.operations);

            state.warning = result.warning;
            state.rows = rows;
            state.visibleRows = state.viewMode === "changes"
                ? rows.filter((row) => row.type !== "unchanged")
                : rows;

            renderDiff(state.visibleRows);
            updateSummary(rows);
        }

        function setMessage(text) {
            message.textContent = text;

            if (text) {
                window.setTimeout(() => {
                    if (message.textContent === text) {
                        message.textContent = "";
                    }
                }, 2500);
            }
        }

        async function copyText(text, successText) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const scratch = document.createElement("textarea");
                    scratch.value = text;
                    scratch.setAttribute("readonly", "");
                    scratch.style.position = "fixed";
                    scratch.style.opacity = "0";
                    document.body.appendChild(scratch);
                    scratch.select();
                    document.execCommand("copy");
                    scratch.remove();
                }

                setMessage(successText);
            } catch (error) {
                setMessage("Copy failed.");
            }
        }

        function csvCell(value) {
            const text = String(value ?? "");
            if (!/[",\n\r]/.test(text)) {
                return text;
            }

            return `"${text.replace(/"/g, '""')}"`;
        }

        function serializeRows(rows) {
            const header = ["Status", "Original line", "Original text", "Revised line", "Revised text"];
            const body = rows.map((row) => [
                row.type,
                row.leftLine ?? "",
                row.leftText,
                row.rightLine ?? "",
                row.rightText
            ]);

            return [header, ...body]
                .map((values) => values.map(csvCell).join(","))
                .join("\n");
        }

        function copyDiff() {
            if (!state.visibleRows.length) {
                setMessage("Nothing to copy.");
                return;
            }

            copyText(serializeRows(state.visibleRows), "Diff copied as CSV.");
        }

        function downloadDiff() {
            if (!state.visibleRows.length) {
                setMessage("Nothing to download.");
                return;
            }

            try {
                const blob = new Blob([serializeRows(state.visibleRows)], { type: "text/csv;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "text-diff.csv";
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
                setMessage("Diff downloaded.");
            } catch (error) {
                setMessage("Download failed.");
            }
        }

        function loadSample(shouldNotify = true) {
            originalText.value = sampleOriginal;
            revisedText.value = sampleRevised;
            update();

            if (shouldNotify) {
                setMessage("Sample loaded.");
            }
        }

        function clearText() {
            originalText.value = "";
            revisedText.value = "";
            update();
            originalText.focus();
            setMessage("Cleared.");
        }

        function swapText() {
            const nextOriginal = revisedText.value;
            revisedText.value = originalText.value;
            originalText.value = nextOriginal;
            update();
            setMessage("Versions swapped.");
        }

        function readTextFile(file, target) {
            if (!file) {
                return;
            }

            const reader = new FileReader();

            reader.onload = () => {
                target.value = String(reader.result || "");
                update();
                setMessage(`Loaded ${file.name}.`);
            };

            reader.onerror = () => setMessage("Could not read file.");

            try {
                reader.readAsText(file);
            } catch (error) {
                setMessage("Could not read file.");
            }
        }

        function syncEditorScroll(source, target) {
            if (!state.syncEditors || syncLock) {
                return;
            }

            const sourceMax = source.scrollHeight - source.clientHeight;
            const targetMax = target.scrollHeight - target.clientHeight;
            const ratio = sourceMax > 0 ? source.scrollTop / sourceMax : 0;

            syncLock = true;
            target.scrollTop = ratio * targetMax;
            window.requestAnimationFrame(() => {
                syncLock = false;
            });
        }

        function bindEvents() {
            originalText.addEventListener("input", update);
            revisedText.addEventListener("input", update);
            originalText.addEventListener("scroll", () => syncEditorScroll(originalText, revisedText));
            revisedText.addEventListener("scroll", () => syncEditorScroll(revisedText, originalText));

            viewModeButtons.forEach((button) => {
                button.addEventListener("click", () => {
                    state.viewMode = button.dataset.viewMode;
                    updateSegments();
                    update();
                });
            });

            ignoreWhitespace.addEventListener("change", () => {
                state.ignoreWhitespace = ignoreWhitespace.checked;
                update();
            });

            ignoreCase.addEventListener("change", () => {
                state.ignoreCase = ignoreCase.checked;
                update();
            });

            wrapLines.addEventListener("change", () => {
                state.wrapLines = wrapLines.checked;
                update();
            });

            syncEditors.addEventListener("change", () => {
                state.syncEditors = syncEditors.checked;
            });

            themeButton.addEventListener("click", () => {
                const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
                applyTheme(nextTheme, true);
            });

            sampleButton.addEventListener("click", loadSample);
            swapButton.addEventListener("click", swapText);
            clearButton.addEventListener("click", clearText);
            copyButton.addEventListener("click", copyDiff);
            downloadButton.addEventListener("click", downloadDiff);

            openOriginalButton.addEventListener("click", () => {
                originalFileInput.value = "";
                originalFileInput.click();
            });

            openRevisedButton.addEventListener("click", () => {
                revisedFileInput.value = "";
                revisedFileInput.click();
            });

            originalFileInput.addEventListener("change", () => readTextFile(originalFileInput.files?.[0], originalText));
            revisedFileInput.addEventListener("change", () => readTextFile(revisedFileInput.files?.[0], revisedText));
        }

        applyTheme(getPreferredTheme());
        bindEvents();
        loadSample(false);

        if (window.lucide) {
            window.lucide.createIcons();
        }
    </script>
</body>
</html>
